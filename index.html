<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alqora Auto's | Exclusive Cars</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #D4AF37; --bg: #050505; --card: #1a1a1a; --text: #fff; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; padding: 0; }
        nav { padding: 20px; text-align: center; border-bottom: 1px solid #333; }
        .logo { color: var(--gold); font-size: 1.5rem; font-weight: bold; text-decoration: none; }
        .hero { padding: 60px 20px; text-align: center; background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)); }
        .container { max-width: 1100px; margin: auto; padding: 40px 20px; }
        .car-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; }
        .car-card { background: var(--card); border-radius: 15px; overflow: hidden; border: 1px solid #333; }
        .car-img { width: 100%; height: 200px; object-fit: cover; background: #222; }
        .car-info { padding: 20px; }
        .car-info h3 { color: var(--gold); margin: 0 0 10px; }
        .btn { display: block; background: var(--gold); color: #000; padding: 12px; text-align: center; text-decoration: none; font-weight: bold; border-radius: 5px; margin-top: 15px; }
        #debug-info { background: #333; color: #0f0; padding: 10px; font-family: monospace; font-size: 12px; margin-top: 20px; white-space: pre-wrap; display: none; }
    </style>
</head>
<body>

    <nav><a href="#" class="logo">ALQORA AUTO'S</a></nav>

    <div class="hero">
        <h1>Onze Showroom</h1>
        <p>Live aanbod vanuit onze database.</p>
    </div>

    <div class="container">
        <div id="status-msg" style="text-align: center; padding: 40px;">Laden van showroom...</div>
        <div class="car-grid" id="car-list"></div>
        <div id="debug-info"></div>
    </div>

    <script>
        const PROJECT_ID = '5qxak6xw';
        const DATASET = 'production';
        const QUERY = encodeURIComponent('*[_type == "car"]{..., "imageUrl": image.asset->url}');
        const URL = `https://${PROJECT_ID}.api.sanity.io/v2021-10-21/data/query/${DATASET}?query=${QUERY}`;

        async function fetchCars() {
            const statusMsg = document.getElementById('status-msg');
            const carList = document.getElementById('car-list');
            const debug = document.getElementById('debug-info');

            try {
                const response = await fetch(URL);
                const data = await response.json();
                
                debug.style.display = 'block';
                debug.innerText = "Debug info: " + JSON.stringify(data, null, 2);

                if (data.result && data.result.length > 0) {
                    statusMsg.style.display = 'none';
                    data.result.forEach(car => {
                        const card = `
                            <div class="car-card">
                                <img src="${car.imageUrl || 'https://via.placeholder.com/400x250/222/D4AF37?text=Geen+foto'}" class="car-img">
                                <div class="car-info">
                                    <h3>${car.merk} ${car.model}</h3>
                                    <p>${car.bouwjaar} | ${car.prijs ? '€ ' + car.prijs.toLocaleString() : 'Prijs op aanvraag'}</p>
                                    <p>${car.beschrijving || ''}</p>
                                    <a href="mailto:info@alqora-autos.nl" class="btn">NEEM CONTACT OP</a>
                                </div>
                            </div>
                        `;
                        carList.innerHTML += card;
                    });
                } else {
                    statusMsg.innerText = "De showroom is momenteel leeg. Voeg een auto toe in Sanity en druk op 'Publish'.";
                }
            } catch (err) {
                statusMsg.innerText = "Fout bij verbinding: " + err.message;
            }
        }
        fetchCars();
    </script>
</body>
</html>
